<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenue dans TextCraft Pro !</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A0A0F;--surface:#13131A;--border:#2A2A3A;--accent:#7C6EFA;--accent2:#FA6E9A;--text:#F0F0F8;--muted:#8888A8;--green:#4EFAC8;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 40px;max-width:440px;width:100%;text-align:center}
.icon{font-size:56px;margin-bottom:20px}
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:28px}
.btn{display:inline-block;padding:14px 32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
</style>
</head>
<body>
<div class="box">
  <div class="icon">✦</div>
  <h1>Bienvenue dans Pro !</h1>
  <p>Votre abonnement est actif. Vous avez maintenant accès aux générations illimitées sur tous les formats.</p>
  <a href="/" class="btn">Commencer à générer →</a>
</div>
</body>
</html>
